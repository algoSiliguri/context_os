name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  ci:
    name: Test & Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      # Lint is non-blocking: 173 known formatting errors exist (Biome style only,
      # no correctness impact). Tracked as debt in DEFINITION_OF_DONE.md.
      # Flip `continue-on-error` to false once lint is clean.
      - name: Lint (non-blocking)
        run: npm run lint
        continue-on-error: true
